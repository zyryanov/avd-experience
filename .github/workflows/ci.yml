name: CI

on:
  pull_request:
    paths:
      - '**/*.fs'
      - '**/*.fsproj'
      - 'TrimmerRoots.xml'
      - 'app.manifest'
  push:
    branches: [main]
    paths:
      - '**/*.fs'
      - '**/*.fsproj'
      - 'TrimmerRoots.xml'
      - 'app.manifest'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Unit Tests
        run: dotnet test AvdExperience.UnitTests

      - name: Integration Tests
        run: dotnet test AvdExperience.IntegrationTests
